variables:
  S3_BUCKET_NAME: mender
  DOCKER_HOST:
    value: 'tcp://docker:2376'
    description: "Required to run dind inside k8s runners with TLS"
  DOCKER_TLS_CERTDIR:
    value: '/certs'
    description: "The cert dir inside the gitlab runner. Don't change this."
  DOCKER_TLS_VERIFY:
    value: 1
    description: "Enable TLS verification for docker in dind"
  DOCKER_CERT_PATH:
    value: "$DOCKER_TLS_CERTDIR/client"
    description: "Used for docker entrypoints. See https://gitlab.com/gitlab-org/gitlab-runner/-/issues/4125"

include:
  - project: Northern.tech/Mender/mendertesting
    file:
      - qa-common/runner.yml
      - qa-common/retry.yml
  - project: 'Northern.tech/Mender/mendertesting'
    file: '.gitlab-ci-check-commits-signoffs.yml'
  - project: 'Northern.tech/Mender/mendertesting'
    file: '.gitlab-ci-check-license.yml'
  - project: 'Northern.tech/Mender/mendertesting'
    file: '.gitlab-ci-github-status-updates.yml'

default:
  tags: !reference [.qa-common-default-runner, tags]
  retry: !reference [.qa-common-default-retry, retry]

stages:
  - test
  - build
  - publish

build:grub-efi:
  stage: build
  image: docker
  services:
    - docker:29.1.4-dind
  before_script:
    - apk --update --no-cache add libc6-compat
  script:
    - ./grub-efi/docker-create-grub-efi-binaries
  artifacts:
    expire_in: 2w
    paths:
      - grub-efi/output/*

test:
  stage: test
  image: debian:12
  variables:
    DEBIAN_FRONTEND: noninteractive
  before_script:
    - !reference [.qa-common-network-apt-retry, before_script]
    - apt update && apt install -yy make
  script:
    - cp mender_grubenv_defines.example mender_grubenv_defines
    - make
    - make check

publish:s3:
  stage: publish
  image: debian:12
  dependencies:
    - build:grub-efi
  before_script:
    - !reference [.qa-common-network-apt-retry, before_script]
    - apt update && apt install -yyq awscli git
  script:
    - ./grub-efi/prepare-output-folder-for-upload
    - aws s3 cp --recursive --acl public-read output/upload/ s3://$S3_BUCKET_NAME/grub-mender-grubenv/
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^(master|[0-9]+\.[0-9]+\.x)$/'
    - if: '$CI_COMMIT_REF_NAME !~ /^(master|[0-9]+\.[0-9]+\.x)$/ && $S3_UPLOAD_AWS_SECRET_ACCESS_KEY'
      when: manual
